<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pets Profile</title>
    <link rel="stylesheet" href="styles/petsProfile.css">
</head>
<body>
    <article class="pet-card">

    <!-- LEFT SIDE: Images -->
    <div class="image-section">
        <img id="mainImage" src="images/dog.jpeg" alt="petImage">

        <div class="thumbnails">
            <img src="images/dog.jpeg" onclick="changeImage(this)">
            <img src="images/dog2.jpeg" onclick="changeImage(this)">
            <img src="images/dog3.jpeg" onclick="changeImage(this)">
        </div>
    </div>

    <!-- RIGHT SIDE Description-->
    <div class="pet-info">
        <h1>Description</h1>
        <ul>
            <li>Name</li>
            <li>Gender</li>
            <li>Age</li>
            <li>Breed</li>
            <li>Weight</li>
            <li>Trained</li>
            <li>Inside/Outside Pet</li>
            <li>Friendly/Not Friendly</li>
            <li>Energetic/Lazy</li>
            <li>Up-to-date Vaccinations</li>
            <li>Medical Conditions/Special Diets</li>
            <li>Past History</li>
        </ul>

        <button class="adopt-button">Adopt Me</button>
    </div>
</article>
<script src="scripts/petsProfile.js"></script>
</body>
</html>
