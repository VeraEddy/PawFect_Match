<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dog Detail Page</title>
<link rel="stylesheet" href="styles/petsProfile.css">
</head>

<body>
<!-- ---- Header ---- -->
<header>
    <img src="images/adoptMe.jpeg" alt="PawFect Match logo">
    <h1>PawFect Match</h1>
</header>

<!-- ---- Navigation bar ---- -->
<nav>
    <ul>
        <li><a href="homePage.html">Home</a></li>
        <li><a href="Find_Your_Pet.html"class="active">Find Your Pet</a></li>
        <li><a href="form.html">Adoption Form</a></li>
        <li><a href="#">Nutrition</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="Contact_Us.html">Contact Us</a></li>
    </ul>
</nav>

<!-- ---- Dynamic Dog Card ---- -->
<div id="dog1" class="container">
    <!-- LEFT SIDE IMAGE -->
    <div class="image-section">
        <img id="productImage" src="" alt="Dog image">
        <div class="buttons">
            <button onclick="prevImage()">Previous</button>
            <button onclick="nextImage()">Next</button>
        </div>
    </div>

    <!-- RIGHT SIDE DESCRIPTION -->
    <div class="description">
        <h2>Description</h2>
        <ul>
            <li>Name: <span id="dogName"></span></li>
            <li>Breed: <span id="dogBreed"></span></li>
            <li>Size: <span id="dogSize"></span></li>
            <li>Gender: <span id="dogGender"></span></li>
            <li>Price: <span id="dogPrice"></span></li>
        </ul>
        <p id="dogDesc"></p>
    </div>
</div>

<!-- ---- Adopt Button ---- -->
 
<a href="/form.html" class="adoptbutton">Adopt Me!</a>

<script src="/scripts/petsProfile.js"></script>

<!-- Footer -->
<footer>
    <p>© 2025 PawFect Match &nbsp;|&nbsp; Made with love for animals everywhere</p>
</footer>
</body>
</html>
