<div class="filter">
        <h3>Filtering</h3>

        <!-- Price Sorting Controls -->
        <div class="sort-controls">
          <h4>Sort by Price:</h4>
          <label>
            <input type="radio" name="sort" value="cheapest" onchange="filterPets()"> Cheapest First
          </label>
          <label>
            <input type="radio" name="sort" value="expensive" onchange="filterPets()"> Most Expensive First
          </label>
          <label>
            <input type="radio" name="sort" value="none" onchange="filterPets()" checked> No Sorting
          </label>
        </div>

        <h4>Type of Pet</h4>
        <label><input type="checkbox" name="type" value="dog" onchange="filterPets()"> Dog</label>
        <label><input type="checkbox" name="type" value="cat" onchange="filterPets()"> Cat</label>
        <label><input type="checkbox" name="type" value="guineapig" onchange="filterPets()"> Guineapig</label>
        <label><input type="checkbox" name="type" value="rabbit" onchange="filterPets()"> Rabbit</label>
        <label><input type="checkbox" name="type" value="bird" onchange="filterPets()"> Bird</label>

        <h4>Price</h4>
        <!-- Price Filter (Checkboxes with Ranges) -->
        <label><input type="checkbox" name="price" value="0-100" onchange="filterPets()"> $0–$100</label>
        <label><input type="checkbox" name="price" value="100-200" onchange="filterPets()"> $100–$200</label>
        <label><input type="checkbox" name="price" value="200-300" onchange="filterPets()"> $200–$300</label>
        <label><input type="checkbox" name="price" value="300-400" onchange="filterPets()"> $300–$400</label>

        <h4>Gender</h4>
        <label><input type="checkbox" name="gender" value="male" onchange="filterPets()"> Male</label>
        <label><input type="checkbox" name="gender" value="female" onchange="filterPets()"> Female</label>

        <h4>Age</h4>
        <!-- Age Filter (Checkboxes) -->
        <label><input type="checkbox" name="age" value="0-1" onchange="filterPets()"> 0–1 years</label>
        <label><input type="checkbox" name="age" value="1-3" onchange="filterPets()"> 1–3 years</label>
        <label><input type="checkbox" name="age" value="3-5" onchange="filterPets()"> 3–5 years</label>
    </div>

<h2>Available Pets</h2>
<div class="pet-grid"></div>


<script src="scripts/pets.js"></script>
</body>
