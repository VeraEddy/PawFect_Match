                                <li><button onclick="showText('large dog’s diet focuses on balanced nutrition that supports joint health, steady energy, and controlled growth. These dogs often need fewer calories per pound than smaller breeds but still require nutrient‑dense meals to maintain muscle and mobility. High‑quality protein supports lean mass, while controlled calcium and phosphorus help protect developing bones. Healthy fats provide sustained energy, and fiber aids digestion. Because large breeds are prone to obesity and orthopedic issues, portion control is essential. Feeding schedules, life stage, and activity level all shape ideal intake, making consistent monitoring important for long‑term health. 1')">LARGE DOGS</button></li>
                                <li><button onclick="showText('A medium dog’s diet centers on **balanced energy, steady metabolism, and maintaining a healthy body condition**. These dogs typically weigh between 25 and 50 pounds, so they need enough high‑quality protein to support muscle without excess calories that could lead to weight gain. Moderate amounts of healthy fats fuel daily activity, while whole‑food carbohydrates provide stable energy. Adequate fiber supports digestion, and vitamins and minerals help maintain immune function and coat health. Because medium dogs vary widely in activity level—from couch companions to athletic breeds—**adjusting portions to their lifestyle** is key to preventing obesity and keeping them energetic and lean.')">MEDIUM DOGS</button></li>
                                <li><button onclick="showText('A small dog’s diet emphasizes **high energy density, precise portions, and nutrient‑rich ingredients** to match their fast metabolism and tiny stomach capacity. These dogs often need **more calories per pound** than larger breeds, delivered through quality proteins and fats that support steady energy and lean muscle. Because they eat smaller meals, each bite must provide concentrated nutrition, including vitamins and minerals that maintain coat health, immunity, and digestion. Their higher risk of low blood sugar makes consistent feeding schedules important. Thoughtful portion control helps prevent obesity while keeping them active, alert, and healthy.')">SMALL DOGS</button></li>
                             </ul>
