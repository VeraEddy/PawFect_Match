                             <summary class="main-btn">Dogs</summary>
                             <ul class="sub">
                                <li><button onclick="showText('large dog’s diet focuses on balanced nutrition that supports joint health, steady energy, and controlled growth. These dogs often need fewer calories per pound than smaller breeds but still require nutrient‑dense meals to maintain muscle and mobility. High‑quality protein supports lean mass, while controlled calcium and phosphorus help protect developing bones. Healthy fats provide sustained energy, and fiber aids digestion. Because large breeds are prone to obesity and orthopedic issues, portion control is essential. Feeding schedules, life stage, and activity level all shape ideal intake, making consistent monitoring important for long‑term health.', 'images/IMG_1954.jpg')">LARGE DOGS</button></li>
                                <li><button onclick="showText('A medium dog’s diet centers on **balanced energy, steady metabolism, and maintaining a healthy body condition**. These dogs typically weigh between 25 and 50 pounds, so they need enough high‑quality protein to support muscle without excess calories that could lead to weight gain. Moderate amounts of healthy fats fuel daily activity, while whole‑food carbohydrates provide stable energy. Adequate fiber supports digestion, and vitamins and minerals help maintain immune function and coat health. Because medium dogs vary widely in activity level—from couch companions to athletic breeds—**adjusting portions to their lifestyle** is key to preventing obesity and keeping them energetic and lean.','images/IMG_5085.jpg')">MEDIUM DOGS</button></li>
                                <li><button onclick="showText('A small dog’s diet emphasizes **high energy density, precise portions, and nutrient‑rich ingredients** to match their fast metabolism and tiny stomach capacity. These dogs often need **more calories per pound** than larger breeds, delivered through quality proteins and fats that support steady energy and lean muscle. Because they eat smaller meals, each bite must provide concentrated nutrition, including vitamins and minerals that maintain coat health, immunity, and digestion. Their higher risk of low blood sugar makes consistent feeding schedules important. Thoughtful portion control helps prevent obesity while keeping them active, alert, and healthy.', 'images/IMG_6186.JPG')">SMALL DOGS</button></li>
                             </ul>
                        </details>
                     </li>

                     <li>
                         <details>
                            <summary class="main-btn">Cats</summary>
                            <ul class="sub">
                                 <li><button onclick="showText('A large cat’s diet centers on high‑quality animal protein, controlled calories, and nutrients that support their size, strength, and long‑term health. Large breeds like Maine Coons or Norwegian Forest Cats often have higher energy needs and longer growth periods, so their food must provide dense protein and moderate fat while keeping carbohydrates low, reflecting their obligate carnivore biology. They typically require 25–35 calories per pound depending on activity, with portions split into consistent meals to support digestion and prevent overeating. Joint and heart‑supporting nutrients—like omega‑3s and taurine—are especially important for maintaining mobility and overall vitality. ', 'https://www.jadpo.co.uk/cdn-cgi/image/fit=cover,format=auto,width=1600,height=800/https://images.ctfassets.net/4cuokmrwdiqv/4nIdMaA8MqErIjJQ3F6uel/1b559c7e46e78afbff30f444337e2782/Biggest-Domestic-Cats-What-Are-the-Largest-Cat-Breeds-2.jpg')">LARGE CATS</button></li>
                                 <li><button onclick="showText('A medium‑sized cat thrives on a protein‑rich, low‑carbohydrate diet that reflects their obligate carnivore biology. Cats rely on nutrients found only in animal tissue, so meals should center on high‑quality animal protein with moderate fat to support energy and muscle maintenance.  Because medium cats have moderate energy needs, balanced portions help prevent both underfeeding and weight gain. Consistent feeding routines and nutrient‑dense foods ensure they receive essential amino acids, vitamins, and minerals that support immunity, coat health, and overall vitality. Their natural metabolism favors smaller, controlled meals that mimic the nutritional profile of prey..','https://tse3.mm.bing.net/th/id/OIP.zgPokZCQyTUPTVtwYeI_ywHaE6?rs=1&pid=ImgDetMain&o=7&rm=3')">MEDIUM CATS</button></li>
                                 <li><button onclick="showText('A small cat thrives on a high‑protein, low‑carbohydrate diet that matches the nutritional profile of prey, since all cats are obligate carnivores who rely on nutrients found only in animal tissue. Their meals should emphasize animal‑based protein, moderate fat for energy, and minimal fillers, reflecting the proportions recommended by veterinary nutrition experts . Because small cats have tiny stomachs, they benefit from nutrient‑dense portions split into multiple meals to maintain steady energy and prevent overeating. Most adult cats average around 20 calories per pound per day, adjusted for activity and health status . Consistent feeding routines support digestion, weight stability, and overall vitality.', 'https://tse2.mm.bing.net/th/id/OIP.6VoxvAFxAhzE5QvrjvAHgAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3')">SMALL CATS</button></li>
                             </ul>
                        </details>
                     </li>


                     <li>
                        <details>
                             <summary class="main-btn">Guinea Pigs</summary>
                             <ul class="sub">
                                 <li><button onclick="showText('A large guinea pig thrives on a fiber‑rich, low‑calorie diet that keeps their digestive system moving and prevents weight gain. The foundation of their meals should be unlimited high‑quality hay, which supports dental health and proper gut function. Fresh vegetables—especially leafy greens—provide essential vitamins like vitamin C, which guinea pigs cannot produce on their own. A small, measured portion of fortified guinea pig pellets adds balanced nutrients without excess calories. Because larger guinea pigs can be prone to obesity, careful portion control, daily exercise, and limiting sugary fruits help maintain a healthy weight and overall vitality..','https://preview.redd.it/qmsrfo2gz1a31.jpg?auto=webp&s=4ecf1968a7256f6edb24c34b38bdc6c00755db1a')">LARGE GUINEA PIGS</button></li>
                                 <li><button onclick="showText('A medium guinea pig thrives on a high‑fiber, vitamin‑rich diet that keeps their digestion steady and supports overall health. Their daily nutrition should be built around unlimited fresh hay, which maintains proper gut movement and naturally wears down their teeth. A generous mix of leafy greens provides essential vitamins—especially vitamin C, which guinea pigs cannot produce themselves. A small, measured portion of fortified guinea pig pellets adds balanced nutrients without unnecessary calories. Because medium guinea pigs can gain weight easily, controlled portions, limited sugary treats, and regular activity help maintain a healthy body condition and long‑term vitality.,'https://res.cloudinary.com/petrescue/image/upload/v1522974321/dbsesynzm4jv6tlznrwt.jpg')">MEDIUM GUINEA PIGS</button></li>
                                <li><button onclick="showText('A small guinea pig thrives on a high‑fiber, nutrient‑dense diet that supports their fast metabolism and delicate digestive system. Their meals should be built around unlimited fresh hay, which keeps their gut moving and naturally files down their ever‑growing teeth. Daily servings of leafy greens provide essential vitamins—especially vitamin C, which guinea pigs cannot make on their own. A tiny portion of fortified pellets adds balanced nutrients without unnecessary calories. Because small guinea pigs can be prone to weight fluctuations, precise portions, limited sugary fruits, and consistent access to clean water help maintain steady energy and overall health.','https://th.bing.com/th/id/R.168a79c9065c0a1d255d042b851aedf4?rik=L5esK%2f9i3zCi9A&riu=http%3a%2f%2fupload.wikimedia.org%2fwikipedia%2fcommons%2f7%2f77%2fSmall_Guinea_Pig.jpg&ehk=y2ZLoU7Vq48%2bZIDFzCkOTmF%2b3ZiRZCp0EYItfYNbmMU%3d&risl=1&pid=ImgRaw&r=0')">SMALL GUINEA PIGS</button></li>
                             </ul>
                        </details>
                    </li>

                    <li>
                        <details>
                             <summary class="main-btn">Rabbits</summary>
                             <ul class="sub">
                                 <li><button onclick="showText('A large rabbit thrives on a high‑fiber, low‑calorie diet that keeps their digestive system active and supports healthy teeth. The foundation of their nutrition should be unlimited fresh hay, which provides essential fiber and naturally files down their continuously growing teeth. Daily servings of leafy greens add vital vitamins and hydration, while a small portion of high‑quality rabbit pellets offers balanced nutrients without excess calories. Because larger rabbits can be prone to weight gain and joint strain, careful portion control, limited sugary treats, and plenty of space for movement help maintain a healthy body condition and long‑term vitality.')">LARGE RABBITS</button></li>
                                 <li><button onclick="showText('A medium rabbit thrives on a high‑fiber, low‑calorie diet that keeps their digestive system active and supports healthy teeth. Their nutrition should be built around unlimited fresh hay, which provides essential fiber and naturally wears down their continuously growing teeth. Daily servings of leafy greens add important vitamins and hydration, while a modest portion of high‑quality rabbit pellets supplies balanced nutrients without excess calories. Because medium rabbits can gain weight if overfed, careful portion control, limited sugary treats, and plenty of room for exercise help maintain a healthy body condition and long‑term vitality.')">MEDIUM RABBITS</button></li>
                                <li><button onclick="showText('A medium rabbit thrives on a high‑fiber, low‑calorie diet that keeps their digestive system active and supports healthy teeth. Their nutrition should be built around unlimited fresh hay, which provides essential fiber and naturally wears down their continuously growing teeth. Daily servings of leafy greens add important vitamins and hydration, while a modest portion of high‑quality rabbit pellets supplies balanced nutrients without excess calories. Because medium rabbits can gain weight if overfed, careful portion control, limited sugary treats, and plenty of room for exercise help maintain a healthy body condition and long‑term vitality.')">SMALL RABBITS</button></li>
                             </ul>
                        </details>
                    </li>


                     <li>
                        <details>
                              <summary class="main-btn">Birds</summary>
                              <ul class="sub">
                                 <li><button onclick="showText('A large bird thrives on a varied, nutrient‑balanced diet that supports strong muscles, vibrant feathers, and long‑term health. Their meals should center on high‑quality pellets, which provide consistent vitamins and minerals. Fresh vegetables and leafy greens add essential nutrients and hydration, while controlled portions of fruit offer natural antioxidants without excess sugar. Many large birds also benefit from safe nuts and seeds as energy‑dense treats, supporting their higher caloric needs. Because large species can be prone to obesity and boredom, measured portions, foraging opportunities, and a diverse rotation of foods help maintain both physical health and mental stimulation.')">LARGE BIRDS</button></li>
                                 <li><button onclick="showText('A medium bird thrives on a balanced, varied diet that supports steady energy, vibrant plumage, and long‑term health. Their meals should be anchored by high‑quality pellets, which provide consistent vitamins and minerals. Fresh vegetables—especially leafy greens—add essential nutrients and hydration, while small portions of fruit offer natural sweetness without excess sugar. Many medium birds benefit from limited seeds or nuts as occasional treats, supporting both enrichment and healthy fats. Because medium species can be prone to selective eating, measured portions, rotating produce, and encouraging foraging behaviors help maintain nutritional balance and keep them mentally stimulated.')">MEDIUM BIRDS</button></li>
                                 <li><button onclick="showText('A small bird thrives on a balanced, nutrient‑dense diet that supports steady energy, bright plumage, and overall vitality. Their meals should be anchored by high‑quality pellets, which provide consistent vitamins and minerals in portions suited to their tiny size. Fresh vegetables—especially leafy greens—add essential nutrients and hydration, while very small amounts of fruit offer natural sweetness without excess sugar. Because many small birds are prone to selective eating, limited seeds should be offered as treats rather than staples. Rotating produce, encouraging foraging, and maintaining measured portions help ensure complete nutrition and keep them mentally engaged.','images/dog.jpeg')">SMALL BIRDS</button></li>
                            </ul>
                        </details>
                     </li>
